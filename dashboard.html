<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Canvas Assignments</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f3fb;
      margin: 0;
      padding: 30px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #7a3e7d;
      margin-bottom: 30px;
    }

    .day-block {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 0 auto 20px auto;
      max-width: 900px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .day-title {
      color: #9e58c2;
      margin-top: 0;
      margin-bottom: 18px;
    }

    .assignment {
      border-top: 1px solid #eee;
      padding: 14px 0;
    }

    .assignment:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .assignment h3 {
      margin: 0 0 8px 0;
      color: #4f2a63;
    }

    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .description {
      line-height: 1.5;
      color: #444;
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      background: white;
      max-width: 700px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .error {
      color: #b00020;
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Your Canvas Assignments
    <div class="controles">
      <label for="sortMode">Sort assignements by:</label>
      <select id="sortMode">
      <option id="sortMode">
      <option value="date">Date</option>
      <option value="day">Day of the week</option>
      <option value="class">Class</option>
      </select>
    </div>
  </h1>

  <div id="error" class="error"></div>
  <div id="assignments"></div>

  <script>
    const stored = sessionStorage.getItem("assignmentsData");
    const data = stored
      ? JSON.parse(stored)
      : { assignmentsByDay: {}, error: "No assignment data found." };

    const container = document.getElementById("assignments");
    const errorBox = document.getElementById("error");
    const sortMode = document.getElementById("sortMode");

    if (data.error) {
      errorBox.textContent = data.error;
    }

    const assignmentsByDay = data.assignmentsByDay || {};

     function flattenAssignments() {
    const allAssignments = [];

    for (const date in assignmentsByDay) {
      assignmentsByDay[date].forEach((assignment) => {
        allAssignments.push({
          ...assignment,
          date,
          dayName: new Date(date + "T00:00:00").toLocaleDateString("en-US", {
            weekday: "long"
          })
        });
      });
    }

    return allAssignments;
  }

  function getClassName(assignment) {
    return (
      assignment.className ||
      assignment.courseName ||
      assignment.courseCode ||
      assignment.courseId ||
      "Unknown Class"
    );
  }

  function groupAssignments(assignments, mode) {
    const grouped = {};

    assignments.forEach((assignment) => {
      let key;

      if (mode === "date") {
        key = assignment.date;
      } else if (mode === "day") {
        key = assignment.dayName;
      } else if (mode === "class") {
        key = getClassName(assignment);
      }

      if (!grouped[key]) {
        grouped[key] = [];
      }

      grouped[key].push(assignment);
    });

    return grouped;
  }

  function sortAssignments(assignments, mode) {
    return assignments.sort((a, b) => {
      if (mode === "class") {
        return getClassName(a).toString().localeCompare(getClassName(b).toString());
      }

      return new Date(a.date) - new Date(b.date);
    });
  }

  function renderAssignments(mode = "date") {
    container.innerHTML = "";

    let allAssignments = flattenAssignments();
    allAssignments = sortAssignments(allAssignments, mode);

    const grouped = groupAssignments(allAssignments, mode);
    let groupKeys = Object.keys(grouped);

    if (mode === "date") {
      groupKeys.sort((a, b) => new Date(a) - new Date(b));
    } else if (mode === "day") {
      const dayOrder = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday"
      ];

      groupKeys.sort((a, b) => dayOrder.indexOf(a) - dayOrder.indexOf(b));
    } else if (mode === "class") {
      groupKeys.sort();
    }

    if (groupKeys.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <p>No assignments found.</p>
        </div>
      `;
      return;
    }

    groupKeys.forEach((group) => {
      const dayBlock = document.createElement("div");
      dayBlock.className = "day-block";

      const title = document.createElement("h2");
      title.className = "day-title";
      title.textContent = group;
      dayBlock.appendChild(title);

      grouped[group].forEach((assignment) => {
        const item = document.createElement("div");
        item.className = "assignment";

        item.innerHTML = `
          <h3>${assignment.title}</h3>
          <div class="meta"><strong>Date:</strong> ${assignment.date}</div>
          <div class="meta"><strong>Day:</strong> ${assignment.dayName}</div>
          <div class="meta"><strong>Class:</strong> ${getClassName(assignment)}</div>
          <div class="meta"><strong>Time:</strong> ${assignment.time}</div>
          <div class="description"><strong>Description:</strong> ${assignment.descriptionText}</div>
        `;

        dayBlock.appendChild(item);
      });

      container.appendChild(dayBlock);
    });
  }

  sortMode.addEventListener("change", () => {
    renderAssignments(sortMode.value);
  });

  renderAssignments("date");
    
  </script>
</body>
</html>
