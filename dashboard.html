<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Canvas Assignments</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f3fb;
      margin: 0;
      padding: 30px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #7a3e7d;
      margin-bottom: 30px;
    }

    .day-block {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 0 auto 20px auto;
      max-width: 900px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .day-title {
      color: #9e58c2;
      margin-top: 0;
      margin-bottom: 18px;
    }

    .assignment {
      border-top: 1px solid #eee;
      padding: 14px 0;
    }

    .assignment:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .assignment h3 {
      margin: 0 0 8px 0;
      color: #4f2a63;
    }

    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .description {
      line-height: 1.5;
      color: #444;
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      background: white;
      max-width: 700px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .error {
      color: #b00020;
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Your Canvas Assignments</h1>

  <div id="error" class="error"></div>
  <div id="assignments"></div>

  <script>
    const stored = sessionStorage.getItem("assignmentsData");
    const data = stored
      ? JSON.parse(stored)
      : { assignmentsByDay: {}, error: "No assignment data found." };

    const container = document.getElementById("assignments");
    const errorBox = document.getElementById("error");

    if (data.error) {
      errorBox.textContent = data.error;
    }

    const assignmentsByDay = data.assignmentsByDay || {};
    const dates = Object.keys(assignmentsByDay).sort();

    if (dates.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <p>No assignments found.</p>
        </div>
      `;
    } else {
      dates.forEach((day) => {
        const dayBlock = document.createElement("div");
        dayBlock.className = "day-block";

        const dayTitle = document.createElement("h2");
        dayTitle.className = "day-title";
        dayTitle.textContent = day;
        dayBlock.appendChild(dayTitle);

        assignmentsByDay[day].forEach((assignment) => {
          const item = document.createElement("div");
          item.className = "assignment";

          item.innerHTML = `
            <h3>${assignment.title}</h3>
            <div class="meta"><strong>Time:</strong> ${assignment.time}</div>
            <div class="description"><strong>Description:</strong> ${assignment.descriptionText}</div>
          `;

          dayBlock.appendChild(item);
        });

        container.appendChild(dayBlock);
      });
    }
  </script>
</body>
</html>
