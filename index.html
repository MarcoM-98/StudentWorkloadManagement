<!DOCTYPE html>
<html>
<head>
  <title>Canvas Login</title>
  <style>
    body {
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f4f6f8;
    }
    form {
      background:rgb(204, 123, 161);
      padding:25px;
      border-radius:8px;
      width:300px;
    }
    input, button {
      width:100%;
      margin-top:10px;
      padding:8px;
    }
    button {
      background:#ff5aaf;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<form method="POST" action="/login">
  <h2>Canvas Login</h2>
  <input name="username" placeholder="NetID" required />
  <input name="password" type="password" placeholder="Password" required />
  <button type="submit">Login</button>
</form>

</body>
</html>
