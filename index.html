<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content ="width=devoce-width,intiial-scale=1.0"/>
  <title>Canvas Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#f8d3e0, #d9c2ff);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      margin: 0;
    }
    .login-box {
      background:rgb(204, 123, 161);
      padding:30px;
      border-radius:18px;
      width:320px;
    }
    h1 {
     text-align: center;
     margin-bottom: 20px;
     color:#7a3e7d;
    }
    label{
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input{
      width: 100%;
      margin: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #b76edc;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #9e58c2;
    }
      
    
  </style>
</head>
<body>
<div class="login-box">
    <h1>Canvas Login</h1>
    <form action="/login" method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Log In</button>

</body>
</html>
